providers:
  - name: primary
    fail_rate: 0.25
    base_latency_ms: 180
    cost_per_1k_tokens: 0.01
  - name: backup
    fail_rate: 0.05
    base_latency_ms: 260
    cost_per_1k_tokens: 0.006
circuit_breaker:
  failure_threshold: 3
  reset_timeout_seconds: 2
  success_threshold: 1
cache:
  enabled: true
  backend: memory          # "memory" (default) or "redis" (requires docker compose up -d)
  ttl_seconds: 300
  similarity_threshold: 0.92
  redis_url: "redis://localhost:6379/0"
load_test:
  requests: 200
  concurrency: 10          # parallel workers per scenario

# Chaos scenarios.
# CB-exercising scenarios disable cache so the circuit actually sees provider traffic.
# cache_off / cache_on pair share default provider rates so only the cache layer differs;
# chaos.run_simulation builds a "cache_comparison" block in metrics.json from this pair.
scenarios:
  - name: primary_timeout_100
    description: "Primary fails 100% — circuit opens, fallback serves traffic"
    provider_overrides:
      primary: 1.0
    cache_override: false
  - name: primary_flaky_50
    description: "Primary fails 50% — circuit should open and recover repeatedly"
    provider_overrides:
      primary: 0.5
    cache_override: false
  - name: all_healthy
    description: "Both providers healthy — no fallback, no circuit trips"
    provider_overrides:
      primary: 0.0
      backup: 0.0
    cache_override: false
  - name: cache_off
    description: "Default providers without cache — baseline for comparison"
    cache_override: false
  - name: cache_on
    description: "Default providers with in-memory cache — measures cache benefit"
    cache_override: true
